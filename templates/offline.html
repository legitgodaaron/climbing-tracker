{% extends "base.html" %}
{% block title %}Offline — ClimbTracker{% endblock %}
{% block content %}

<div class="card empty-state" style="margin-top:2rem;">
  <div style="font-size:2.5rem; margin-bottom:.5rem;">📡</div>
  <h1 style="font-size:1.4rem; margin-bottom:.5rem;">You're offline</h1>
  <p style="margin-bottom:1.25rem;">
    ClimbTracker can't reach the network right now. Check your connection and try again.
  </p>
  <button type="button" class="btn btn-primary" onclick="location.reload()">Retry</button>
</div>

{% endblock %}
