{% extends "base.html" %}
{% block title %}Page Not Found — ClimbTracker{% endblock %}
{% block content %}
<div class="page-header">
  <h1>404</h1>
</div>
<div class="card" style="text-align:center; padding:2.5rem 1.5rem;">
  <div style="font-size:3rem; margin-bottom:1rem;">🧗</div>
  <div style="font-size:1.1rem; font-weight:600; margin-bottom:.5rem;">Page not found</div>
  <div style="color:var(--muted); margin-bottom:1.5rem;">That route doesn't exist — maybe it was deleted or the URL is wrong.</div>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Back to home</a>
</div>
{% endblock %}
